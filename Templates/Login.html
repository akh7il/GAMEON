<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameOn</title>
    <link rel="stylesheet" href="../css/Login.css">
    <link rel="stylesheet" href="../css/LoginResponsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Protest+Guerrilla&display&family=Alumni+Sans+Pinstripe:ital@0;1&display&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login_card">
        <div class="card_left"></div>
        <div class="card_right">
            <h1 class="card_brand"><span class="GO">G</span>ame<span class="GO">O</span>n</h1>
            <h1 class="message">log in account</h1>
            <p class="sub_message">welcome back</p>
            <form action="" class="login_form">
                <input type="text" name="login_username" id="login_username" class="user_name" placeholder="name">
                <input type="text" name="login_email" id="login_email" class="user_email" placeholder="email">
                <input type="password" name="login_password" id="login_password" class="user_password" placeholder="password">
                <p class="forgot">forgot password ?</p>
                <button type="submit" class="login btn">login</button>
            </form>
            <form action="" class="signup_form">
                <input type="text" name="signup_username" id="signup_username" class="user_name" placeholder="name">
                <input type="email" name="signup_email" id="signup_email" class="user_email" placeholder="email">
                <input type="tel" name="signup_phone" id="signup_phone" class="user_phone" placeholder="phone" maxlength="10">
                <input type="password" name="user_signup_password" id="user_signup_password" class="user_password" placeholder="create password">
                <button type="submit" class="signup btn">signup</button>
            </form>
            <div class="toggler">
                <button class="toggle btn" id="toggle">create account</button>
            </div>
        </div>
    </div>
    <script src="../js/Login.js"></script>
</body>
</html>
